site_name: House of Light Wiki
site_description: The wiki for the House of Light fantasy series
site_url: https://chellxffs.github.io/hol-docs/
repo_url: https://github.com/chellxffs/hol-docs
repo_name: chellxffs/hol-docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
  font:
    text: Crimson Pro
    code: Source Code Pro

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - tags

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Characters:
    - Overview: characters/index.md
    # Main Characters
    - "Tadhana Bakunawa": characters/tadhana.md
    - "Amihan Bakunawa": characters/amihan.md
    - "Mahalia Bakunawa": characters/mahalia.md
    - "Liwei Tengku": characters/liwei.md
    - "Palani": characters/palani.md
    - "Setia": characters/setia.md
    - "Som": characters/som.md
    - "Jinhai Nangong": characters/jinhai.md
    - "Phichai": characters/phichai.md
    - "Inzali": characters/inzali.md
    - "Ahn Maniyong": characters/ahn.md
    - "Vatsana Maniyong": characters/vatsana.md
    - "Sunya Maniyong": characters/sunya.md
    - "Htun Chey": characters/htun.md
    # Tatloans
    - "Bakala": characters/bakala.md
    - "Kaali": characters/kaali.md
    - "Sama": characters/sama.md
    # Adlawans
    - "Tala Adlawan": characters/tala.md
    - "Chesa Adlawan": characters/chesa.md
    - "Datu Adlawan": characters/datu.md
    # Bakunawas
    - "Habagat Bakunawa": characters/habagat.md
    - "Bayani Bakunawa": characters/bayani.md
    - "Kawayan Bakunawa": characters/kawayan.md
  - World:
    - Overview: world/index.md
    - "Hanan (Realm Template)": world/realm-template.md
  - Locations:
    - Overview: locations/index.md
    - "The Ember Citadel (Location Template)": locations/location-template.md
  - Lore & Magic: lore/index.md
  - Timeline: timeline/index.md
  - All Tags: tags.md
